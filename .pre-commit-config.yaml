# .pre-commit-config.yaml — agent-methodology (RECOMMENDED tier)
#
# Greenfield setup:
#   git init
#   pre-commit install --install-hooks      # or, for a zero-Python single binary:  prek install
#
# CI re-runs THIS SAME FILE (see .github/workflows/checks.yml), so local and CI cannot drift.
# Every external `rev:` is pinned to an immutable tag (run `pre-commit autoupdate --freeze`
# to rewrite them to commit SHAs for maximum reproducibility).

default_install_hook_types: [pre-commit, commit-msg]
minimum_pre_commit_version: "3.5.0"

repos:
  # ---- generic file hygiene -------------------------------------------------
  # Python-language hooks, provisioned in an isolated env; the repo tree stays markdown.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-case-conflict          # skill-slug directory names are case-load-bearing
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key           # honors the "no secrets" invariant; no baseline needed
      # `no-commit-to-branch` is intentionally OMITTED: this is a solo repo whose working
      # branch IS main. Teams adopting templates/git-controls/ can re-enable it there.

  # ---- generic markdown style ----------------------------------------------
  # Node hook, auto-provisioned and sandboxed by the manager (never committed).
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.1
    hooks:
      - id: markdownlint-cli2
        # Config: .markdownlint-cli2.yaml (MD013/MD033/MD041 relaxed for a prose pack).
        # markdownlint targets *.md, so the Cursor .mdc adapter is not linted here —
        # it is covered by check-adapters-no-stale-links.sh below.

  # ---- conventional-commit TYPE PREFIX (commit-msg stage) -------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, refactor, test, build, ci, perf, style, revert]

  # ---- shell lint over the consumption toolchain (repo-specific, scoped) ----
  # shellcheck-py bundles the binary (no system or docker dependency). We match the consume
  # shell files EXPLICITLY (scripts + the extensionless tests/t_* + _lib.sh) with types:[file],
  # so lint coverage does NOT depend on the git executable bit — identify's shebang detection
  # would otherwise skip a non-+x extensionless test. Scoped to tools/consume/, so the hook is
  # skipped in any repo without those paths — dormant for adopters of the generic starter.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^tools/consume/(.+\.sh|tests/t_[A-Za-z0-9_]+)$
        types: [file]

  # ---- PROJECT-INVARIANT VALIDATORS ----------------------------------------
  # POSIX sh, zero runtime deps. These encode THIS pack's contract — exactly what a
  # human reviewer used to check by hand, and what no off-the-shelf linter can verify.
  - repo: local
    hooks:
      - id: check-skill-frontmatter
        name: "every SKILL.md has name==slug, 'Use when' description, Enforcement section"
        language: script
        entry: scripts/checks/check-skill-frontmatter.sh
        files: ^skills/.*/SKILL\.md$
        pass_filenames: false
      - id: check-agents-links-skills
        name: "AGENTS.md links every skill (and only real ones)"
        language: script
        entry: scripts/checks/check-agents-links-skills.sh
        files: ^(AGENTS\.md|skills/)
        pass_filenames: false
      - id: check-readme-index
        name: "README skill-index == skills/ dirs"
        language: script
        entry: scripts/checks/check-readme-index.sh
        files: ^(README\.md|skills/)
        pass_filenames: false
      - id: check-crosslinks-resolve
        name: "every ../<slug>/SKILL.md cross-link resolves"
        language: script
        entry: scripts/checks/check-crosslinks-resolve.sh
        files: ^skills/.*\.md$
        pass_filenames: false
      - id: check-adapters-no-stale-links
        name: "adapters carry no stale ../../ links"
        language: script
        entry: scripts/checks/check-adapters-no-stale-links.sh
        files: ^adapters/
        pass_filenames: false
      - id: check-adapters-complete
        name: "every enumerating adapter lists all skills"
        language: script
        entry: scripts/checks/check-adapters-complete.sh
        files: ^(adapters/|skills/)
        pass_filenames: false
      - id: check-templates-in-sync
        name: "templates/git-controls mirrors the root controls"
        language: script
        entry: scripts/checks/check-templates-in-sync.sh
        files: ^(templates/git-controls/|scripts/checks/|\.pre-commit-config\.yaml|\.markdownlint-cli2\.yaml|\.github/workflows/checks\.yml)
        pass_filenames: false
      - id: check-one-pin-per-action
        name: "every Action is SHA-pinned, one pin per action repo-wide"
        language: script
        entry: scripts/checks/check-one-pin-per-action.sh
        pass_filenames: false
      - id: check-no-private-identifiers
        name: "no private identifier (hostname, internal name) enters the repo"
        language: script
        entry: scripts/checks/check-no-private-identifiers.sh
        pass_filenames: false
      # ---- CONSUMPTION-TOOLCHAIN GATE (repo-specific; scoped to tools/consume/) --------
      # Enforce THIS pack's consumption tooling. Each hook fires only on a staged
      # ^tools/consume/ path, so it is skipped in any repo without that directory — dormant
      # for adopters of the generic templates/git-controls/ starter (whose consume scripts
      # are NOT mirrored). An adopter that creates a tools/consume/ path would trip these
      # against missing scripts; the byte-mirror keeps them here, so the assumption is
      # documented rather than silently shipped.
      - id: check-consume-deny-paths
        name: "consumption deny-path gate: enumerated set complete + each passes (fail-closed)"
        language: script
        entry: tools/consume/check-consume-deny-paths.sh
        files: ^tools/consume/
        pass_filenames: false
      - id: run-consume-tests
        name: "consumption toolchain: positive test suite passes"
        language: script
        entry: tools/consume/run-consume-tests.sh
        files: ^tools/consume/
        pass_filenames: false
      - id: check-no-marketplace-artifacts
        name: "no marketplace/signing artifacts (REQ-10 non-goal)"
        language: script
        entry: tools/consume/check-no-marketplace-artifacts.sh
        # The scan is repo-wide (git index) but triggered on ^tools/consume/, to stay dormant
        # for adopters. Consequence: a LOCAL `git commit` adding a marketplace.json/*.sig
        # elsewhere without touching tools/consume/ does NOT fire it locally. REQ-10 is
        # enforced by CI's `pre-commit run --all-files` (tools/consume/ is always staged there)
        # — the merge gate under propose-only — not the local pre-commit stage.
        files: ^tools/consume/
        pass_filenames: false
      # OPT-IN: commits touching live-surface paths must carry an Evidence: trailer.
      # Configure EVIDENCE_PATH_REGEX in the script first (fail-closed if you don't).
      # - id: check-evidence-trailer
      #   name: "live-surface commits carry an Evidence: trailer"
      #   language: script
      #   entry: scripts/checks/check-evidence-trailer.sh
      #   stages: [commit-msg]
      - id: check-commit-trailer
        name: "commit body carries a provenance trailer"
        language: script
        entry: scripts/checks/check-commit-trailer.sh
        stages: [commit-msg]
